name: Sync Indodax Deposits

on:
  schedule:
    - cron: "*/10 * * * *"   # tiap 10 menit
  workflow_dispatch: {}       # bisa juga dipicu manual dari tab Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Panggil endpoint sync Indodax
        run: |
          curl -sf "https://danatesting.pages.dev/webhook/indodax?token=${{ secrets.INDODAX_CRON_SECRET }}" \
            || (echo "Sync gagal!" && exit 1)
